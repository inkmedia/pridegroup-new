  <text x="228" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.7)" font-weight="bold">2022</text>
  <!-- Bar 2018: 350 -->
  <rect x="50" y="200" width="36" height="62" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1" rx="2 2 0 0"/>
