  <!-- Chart bars growing left to right -->
  <!-- Bar labels (years) -->
  <text x="68" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.6)">2018</text>
  <text x="108" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.6)">2019</text>
  <text x="148" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.6)">2020</text>
