  <!-- Bar 2019: 480 -->
  <rect x="90" y="183" width="36" height="79" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.3)" stroke-width="1" rx="2 2 0 0"/>
  <text x="108" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.6)">480Cr</text>
  <!-- Bar 2020: 540 -->
  <rect x="130" y="170" width="36" height="92" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.35)" stroke-width="1" rx="2 2 0 0"/>
  <text x="148" y="167" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.6)">540Cr</text>
  <!-- Bar 2021: 720 -->
  <rect x="170" y="145" width="36" height="117" fill="rgba(255,255,255,0.35)" stroke="rgba(255,255,255,0.4)" stroke-width="1" rx="2 2 0 0"/>
  <text x="188" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.7)">720Cr</text>
  <!-- Bar 2022: 1000 Cr - GOLD highlight -->
  <rect x="210" y="100" width="36" height="162" fill="#C8A84B" stroke="#C8A84B" stroke-width="1" rx="2 2 0 0" opacity="0.9"/>
  <!-- Glow on gold bar -->
  <rect x="210" y="100" width="36" height="162" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" rx="2 2 0 0"/>
  <text x="228" y="95" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#FFFFFF" font-weight="bold">₹1000</text>
  <text x="228" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#FFFFFF">CRORE</text>
  <!-- Upward arrow on top of gold bar -->
  <polygon points="228,88 222,100 234,100" fill="#FFFFFF"/>
  <!-- Baseline -->
  <line x1="40" y1="262" x2="255" y2="262" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Y-axis -->
  <line x1="40" y1="262" x2="40" y2="88" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Milestone label -->
  <rect x="55" y="45" width="160" height="30" fill="rgba(200,168,75,0.15)" stroke="#C8A84B" stroke-width="1.5" rx="4"/>
  <text x="135" y="62" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#C8A84B" font-weight="bold">MILESTONE ACHIEVED</text>
  <text x="135" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.7)" letter-spacing="2">ANNUAL TURNOVER · ₹1,000 CRORE</text>
  <!-- Ground -->
    <line x1="30" y1="285" x2="370" y2="285" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

</svg>