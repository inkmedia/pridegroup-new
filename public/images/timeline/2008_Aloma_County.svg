  <rect x="322" y="166" width="14" height="13" fill="rgba(255,255,255,0.7)" rx="1"/>
  <rect x="303" y="184" width="14" height="13" fill="rgba(255,255,255,0.7)" rx="1"/>
  <rect x="322" y="184" width="14" height="13" fill="rgba(200,168,75,0.9)" rx="1"/>
  <rect x="303" y="202" width="14" height="13" fill="rgba(200,168,75,0.9)" rx="1"/>
  <rect x="322" y="202" width="14" height="13" fill="rgba(255,255,255,0.7)" rx="1"/>
  <!-- Trees -->
  
  <rect x="28" y="261.25" width="4" height="13.75" fill="rgba(255,255,255,0.5)"/>
  <polygon points="30,220 18.0,261.25 42.0,261.25" fill="rgba(255,255,255,0.7)"/>
  <polygon points="30,228.25 19.2,250.25 40.8,250.25" fill="rgba(255,255,255,0.5)"/>
  
  <rect x="368" y="261.25" width="4" height="13.75" fill="rgba(255,255,255,0.5)"/>
  <polygon points="370,220 358.0,261.25 382.0,261.25" fill="rgba(255,255,255,0.7)"/>
  <polygon points="370,228.25 359.2,250.25 380.8,250.25" fill="rgba(255,255,255,0.5)"/>
  
  <rect x="43" y="230.0" width="4" height="10.0" fill="rgba(255,255,255,0.5)"/>
  <polygon points="45,200 36.0,230.0 54.0,230.0" fill="rgba(255,255,255,0.7)"/>
