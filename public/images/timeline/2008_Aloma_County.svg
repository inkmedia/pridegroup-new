  <polygon points="355,206.0 346.9,222.0 363.1,222.0" fill="rgba(255,255,255,0.5)"/>
  <!-- Ground -->
    <line x1="30" y1="276" x2="370" y2="276" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- "40 ACRES" -->
  <text x="200" y="300" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.5)" letter-spacing="3">40-ACRE TOWNSHIP</text>

</svg>