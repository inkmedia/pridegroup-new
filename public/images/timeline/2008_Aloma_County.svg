<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="320" fill="#1F3F6B"/>
  <!-- Subtle grid texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  </pattern>
  <rect width="400" height="320" fill="url(#grid)"/>

  <!-- Grand entrance gate -->
  <rect x="155" y="180" width="20" height="95" fill="rgba(255,255,255,0.2)" stroke="#FFFFFF" stroke-width="2" rx="2"/>
  <rect x="225" y="180" width="20" height="95" fill="rgba(255,255,255,0.2)" stroke="#FFFFFF" stroke-width="2" rx="2"/>
  <!-- Gate arch -->
  <path d="M155,180 Q200,145 245,180" fill="rgba(255,255,255,0.12)" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Gate top ornament -->
  <polygon points="200,135 193,148 207,148" fill="#C8A84B"/>
  <rect x="196" y="148" width="8" height="12" fill="#C8A84B"/>
  <!-- Gate decorative elements -->
  <rect x="148" y="175" width="34" height="8" fill="#C8A84B" rx="2"/>
  <rect x="218" y="175" width="34" height="8" fill="#C8A84B" rx="2"/>
  <!-- Gate name plate -->
  <rect x="166" y="160" width="68" height="18" fill="#1F3F6B" stroke="#C8A84B" stroke-width="1.5" rx="2"/>
  <text x="200" y="173" text-anchor="middle" font-family="Georgia,serif" font-size="7" fill="#C8A84B" font-weight="bold" letter-spacing="1">ALOMA COUNTY</text>
  <!-- Gate opening -->
  <rect x="178" y="228" width="44" height="47" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Gate fence left -->
  <line x1="50" y1="245" x2="155" y2="245" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="70" y1="235" x2="70" y2="255" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="90" y1="235" x2="90" y2="255" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="110" y1="235" x2="110" y2="255" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="130" y1="235" x2="130" y2="255" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Gate fence right -->
  <line x1="245" y1="245" x2="350" y2="245" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="265" y1="235" x2="265" y2="255" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="285" y1="235" x2="285" y2="255" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="305" y1="235" x2="305" y2="255" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="325" y1="235" x2="325" y2="255" stroke="#FFFFFF" stroke-width="1.5"/>
