  <!-- villa roof -->
  <polygon points="55,135 80,110 105,135" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  
  <rect x="63" y="148" width="14" height="13" fill="rgba(200,168,75,0.9)" rx="1"/>
